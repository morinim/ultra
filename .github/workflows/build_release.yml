name: Build and test all platforms

permissions:
  contents: read

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - .gitignore

  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - .gitignore

  workflow_dispatch:

jobs:
  build-test:
    name: ${{matrix.config.name}}
    runs-on: ${{matrix.config.os}}
    strategy:
      fail-fast: false
      matrix:
        config:
        - {
            name: "ARM Ubuntu GCC Debug",
            build_type: "Debug",
            os: ubuntu-24.04-arm,
            generator: default,
            cc: "gcc-14", cxx: "g++-14"
          }
        - {
            name: "ARM Ubuntu GCC Release",
            build_type: "Release",
            os: ubuntu-24.04-arm,
            generator: default,
            cc: "gcc-14", cxx: "g++-14"
          }
        - {
            name: "ARM Ubuntu GCC TSan",
            build_type: "Release",
            os: ubuntu-24.04-arm,
            generator: default,
            cc: "gcc-14", cxx: "g++-14",
            cmake_options: "-DCMAKE_CXX_FLAGS='-fsanitize=thread' -DCMAKE_EXE_LINKER_FLAGS='-fsanitize=thread'"
          }
        - {
            name: "ARM Windows MSVC Release",
            build_type: "Release",
            os: windows-11-arm,
            generator: default,
            cc: "cl", cxx: "cl"
          }
        - {
            name: "Intel Ubuntu CLANG Debug",
            build_type: "Debug",
            os: ubuntu-latest,
            generator: default,
            cc: "clang-21", cxx: "clang++-21"
          }
        - {
            name: "Intel Ubuntu CLANG Release",
            build_type: "Release",
            os: ubuntu-latest,
            generator: default,
            cc: "clang-21", cxx: "clang++-21"
          }
        - {
            name: "Intel Ubuntu CLANG TSan",
            build_type: "Release",
            os: ubuntu-latest,
            generator: default,
            cc: "clang-21", cxx: "clang++-21",
            cmake_options: "-DCMAKE_CXX_FLAGS='-fsanitize=thread' -DCMAKE_EXE_LINKER_FLAGS='-fsanitize=thread'"
          }
        - {
            name: "Intel Ubuntu GCC Debug",
            build_type: "Debug",
            os: ubuntu-latest,
            generator: default,
            cc: "gcc-14", cxx: "g++-14"
          }
        - {
            name: "Intel Ubuntu GCC Release",
            build_type: "Release",
            os: ubuntu-latest,
            generator: default,
            cc: "gcc-14", cxx: "g++-14"
          }
        - {
            name: "Intel Ubuntu GCC TSan",
            build_type: "Release",
            os: ubuntu-latest,
            generator: default,
            cc: "gcc-14", cxx: "g++-14",
            cmake_options: "-DCMAKE_CXX_FLAGS='-fsanitize=thread' -DCMAKE_EXE_LINKER_FLAGS='-fsanitize=thread'"
          }
        - {
            name: "Intel Windows MINGW Release",
            build_type: "Release",
            os: windows-latest,
            generator: "MinGW Makefiles",
            cc: "gcc", cxx: "g++"
          }
        - {
            name: "Intel Windows MSVC Debug",
            build_type: "Debug",
            os: windows-latest,
            generator: default,
            cc: "cl", cxx: "cl"
          }
        - {
            name: "Intel Windows MSVC Release",
            build_type: "Release",
            os: windows-latest,
            generator: default,
            cc: "cl", cxx: "cl"
          }
        #- {
        #    name: "macOS GCC ",
        #    os: macos-latest,
        #    generator: default,
        #    cc: "gcc", cxx: "g++"
        #  }

    env:
      CC: ${{matrix.config.cc}}
      CXX: ${{matrix.config.cxx}}

    steps:
      - uses: actions/checkout@v6

      - name: Install Clang 21
        if: ${{runner.os == 'Linux' && contains(matrix.config.name, 'CLANG')}}
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null

          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-21 lld-21

      - name: Configure CMake (default generator)
        if: ${{matrix.config.generator == 'default' && runner.os != 'Windows'}}
        working-directory: ${{github.workspace}}
        run: cmake -DCMAKE_BUILD_TYPE=${{matrix.config.build_type}} ${{matrix.config.cmake_options || ''}} -B build/ src/

      - name: Configure CMake (specific generator)
        if: ${{matrix.config.generator != 'default'}}
        working-directory: ${{github.workspace}}
        run: cmake -G"${{matrix.config.generator}}" -DCMAKE_BUILD_TYPE=${{matrix.config.build_type}} ${{matrix.config.cmake_options || ''}} -B build/ src/

      - name: Build
        working-directory: ${{github.workspace}}
        run: cmake --build build/ --config ${{matrix.config.build_type}} --verbose

      - name: Test (ctest)
        if: ${{matrix.config.generator == 'default'}}
        working-directory: ${{github.workspace}}/build/test
        run: ctest --output-on-failure -C ${{matrix.config.build_type}}

      - name: Test (skip)
        if: ${{matrix.config.generator != 'default'}}
        run: echo "CTest skipped due to issues between doctest and MinGW"
